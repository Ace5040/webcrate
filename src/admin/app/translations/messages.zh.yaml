        https: HTTPS
        nginx_template: Nginx 模板
        backend: 后端
        redirect: 重定向到 HTTPS
        gzip: Gzip
        nginx_options: Nginx 选项
        nginx_block: 自定义 Nginx 块
        password: 密码
        auth_locations: 受保护路径
        volume: 存储卷
        root_folder: 根目录
        mysql: MySQL 8
        mysql5: MySQL 5.7
        postgre: PostgreSQL
        Memcached: Memcached
        Solr: Solr
        Elastic: Elasticsearch
        DuplicityFilters: 备份过滤器
        gunicorn_app_module: Gunicorn 模块
        url: 重定向 URL
    help:
        uid: 系统自动分配的唯一标识符，不可更改。
        project_name: 仅限小写字母和数字，必须以字母开头。用作项目目录名称。
        redirect_name: 仅限小写字母和数字，必须以字母开头。用作重定向标识符。
        project_active: 该项目是否处于活跃状态并由网站服务器提供服务。
        redirect_active: 此重定向是否当前处于活跃状态。
        project_domains: 指向此项目的域名。
        redirect_domains: 需要重定向的域名。
        project_https: 此项目的 SSL/TLS 证书配置。
        redirect_https: 此重定向的 SSL/TLS 证书配置。
        nginx_template: 用于此项目的 Nginx 配置模板。
        backend: 此项目的后端语言/运行时及版本。
        redirect: 将所有 HTTP 流量重定向到 HTTPS（需要启用 HTTPS）。
        gzip: 启用 HTTP 响应的 gzip 压缩。
        nginx_options: 添加到 server 块的额外 Nginx 指令。
        nginx_block: 直接插入的自定义 Nginx server 块配置。
        password: HTTP Basic Auth 密码。留空则保持当前密码不变。
        auth_locations: 受 HTTP Basic Auth 保护的 URL 路径。
        volume: 项目文件所在的存储卷。
        root_folder: '相对于项目根目录的文档根目录（例如 "public" 或 "web"）。'
        mysql: 为此项目创建 MySQL 8 数据库。
        mysql5: 为此项目创建 MySQL 5.7 数据库。
        postgre: 为此项目创建 PostgreSQL 数据库。
        Memcached: 为此项目启用专用 Memcached 实例。
        Solr: 启用 Apache Solr 全文搜索。
        Elastic: 为此项目启用 Elasticsearch。
        backup: 为此项目启用定时备份。
        DuplicityFilters: 备份中要包含或排除的路径。
        gunicorn_app_module: Python WSGI 应用模块路径，仅用于 Gunicorn 后端。
        url: 访客将被重定向到的目标 URL。
    validation:
        name_invalid: 仅限小写字母和数字，必须以字母开头。
        name_taken: 此名称已被占用。
